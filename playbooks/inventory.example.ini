# Ansible inventory — copy this to inventory.ini and edit (the installer
# does the copy for you on first boot).
# ----------------------------------------------------------------------------
# Hosts are listed under [group] sections. A host can be in multiple groups.
# Variables on the same line as a host are per-host overrides.
# Variables under a [group:vars] section apply to every host in that group.
# A [group:children] section makes one group a parent of others (hosts in
# the children groups are also in the parent).
#
# Recommended workflow: use `add-server` from the LXC shell — it handles
# group selection, SSH keys, sudo passwords, and vault encryption for you.
#
# DO NOT parse this file with PHP's parse_ini_file() — the format looks
# INI-shaped but per-host vars on the same line aren't valid INI. The web UI
# uses `ansible-inventory --list` (canonical JSON) instead.
# ----------------------------------------------------------------------------

# --- Cross-cutting: any host running Apache (in addition to its env group) ---
[apache]
# web1 ansible_host=10.0.0.10

# --- Environment groups: pick the one that fits each host ---

[production]
# Live, customer-facing servers
# prod1 ansible_host=prod1.example.com

[nonprod]
# Staging, sandbox, dev, test
# stage1 ansible_host=stage1.example.com

[homelab]
# Personal / learning / lab servers
# pi4 ansible_host=10.0.0.50

# Group-of-groups: targeting --limit fleet hits everything below.
[fleet:children]
production
nonprod
homelab

# --- Per-group defaults (override per-host in host_vars/<host>.yml) ---
[apache:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519

[production:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519

[nonprod:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519

[homelab:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519
