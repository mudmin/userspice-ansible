# Ansible inventory — copy this to inventory.ini and edit.
# ----------------------------------------------------------------------------
# Hosts are listed under [group] sections. A host can be in multiple groups.
# Variables on the same line as a host are per-host overrides.
# Variables under a [group:vars] section apply to every host in that group.
# A [group:children] section makes one group a parent of others (hosts in
# the children groups are also in the parent).
#
# DO NOT parse this file with PHP's parse_ini_file() — the format looks
# INI-shaped but per-host vars on the same line aren't valid INI. The web UI
# uses `ansible-inventory --list` (canonical JSON) instead.
# ----------------------------------------------------------------------------

# --- Apache web servers ---
[apache]
# web1 ansible_host=10.0.0.10
# web2 ansible_host=web2.example.com

# --- Non-production / sandbox ---
[nonprod]
# sandbox1 ansible_host=10.0.0.50

# --- Database servers (uncomment and add hosts when needed) ---
# [db]
# db1 ansible_host=10.0.0.20

# --- Group-of-groups: targeting --limit production hits both apache and db ---
# [production:children]
# apache
# db

# --- Per-group defaults (override per-host in host_vars/<host>.yml) ---
[apache:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519

[nonprod:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_ed25519
